<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watching {{ video.title }} - UNIFIX</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header id="navbar">
        <a href="/" class="logo">UNIFIX</a>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="#">Movies</a></li>
                <li><a href="#">TV Shows</a></li>
            </ul>
        </nav>
    </header>

    <div class="player-container">
        <!-- Player Section -->
        <div class="video-wrapper">
            {% if video.video_url %}
                 <!-- Expected format for Drive is the embed link: https://drive.google.com/file/d/ID/preview -->
                <iframe src="{{ video.video_url }}" allow="autoplay" allowfullscreen></iframe>
            {% else %}
                <div style="display: flex; height: 100%; align-items: center; justify-content: center; background: #222; color: #888;">
                    No Video Source Found
                </div>
            {% endif %}
        </div>

        <div class="video-info">
            <h1>{{ video.title }}</h1>
            <div class="video-meta-tags">
                <span class="info-badge" style="background: var(--accent-color); color: #000;">{{ video.type }}</span>
                <span class="info-badge">{{ video.category }}</span>
                <span class="info-badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right:4px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg> {{ video.views }} Views</span>
            </div>
            <p class="video-description">
                {{ video.description }}
            </p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
