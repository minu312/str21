<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIFIX - Watch Premium TV Shows & Movies</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header id="navbar">
        <div class="logo">UNIFIX</div>
        <nav>
            <ul>
                <li><a href="/" class="active">Home</a></li>
                <li><a href="#">Movies</a></li>
                <li><a href="#">TV Shows</a></li>
                <li><a href="#">Sinhala Subtitles</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% for category, videos in collection.items() %}
        <section class="movie-section">
            <div class="section-header">
                <h2 class="section-title">{{ category }} Movies</h2>
                <a href="#" class="btn btn-primary" style="padding: 0.4rem 1rem; font-size: 0.85rem;">View All</a>
            </div>
            
            <div class="movie-grid">
                {% for video in videos %}
                <a href="/watch/{{ video.id }}" class="movie-card">
                    <div class="poster-wrapper">
                        <!-- Badges -->
                        <div class="quality-badge">WEBRip</div>
                        <div class="rating-badge">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            7.5
                        </div>
                        
                        <img src="{{ video.poster_url }}" alt="{{ video.title }}" loading="lazy">
                        
                        <!-- Hover Overlay -->
                        <div class="poster-overlay">
                            <div class="play-icon">
                                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                    </div>
                    
                    <div class="card-info">
                        <h3 class="card-title">{{ video.title }}</h3>
                        <div class="card-meta">
                            <span>{{ video.type }}</span>
                            <span>2024</span>
                        </div>
                    </div>
                </a>
                {% endfor %}
            </div>
        </section>
        {% endfor %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
